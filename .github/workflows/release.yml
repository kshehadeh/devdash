name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-mac:
    runs-on: macos-latest
    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: bun run electron:rebuild

      - name: Build Next.js + Electron and publish
        env:
          # GitHub token — used by electron-builder to upload assets to the release
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # Apple Developer signing certificate (base64-encoded .p12)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          # Apple notarization credentials
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run electron:build:publish

      # electron-builder creates the draft release without a body; fill it from commits since the last published release.
      - name: Add release notes (commits since last published release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/attach-github-release-notes.sh
