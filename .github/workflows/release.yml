name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-mac:
    runs-on: macos-latest
    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: bun run electron:rebuild

      - name: Build Next.js + Electron and publish
        env:
          # GitHub token — used by electron-builder to upload assets to the release
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # Apple Developer signing certificate (base64-encoded .p12)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          # Apple notarization credentials
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run electron:build:publish

      # electron-builder creates the draft release without a body; GitHub’s API fills it from merged PRs.
      # Baseline = latest GitHub release that is published (not draft) and not this tag — same idea as comparing tags on the server.
      - name: Add GitHub-generated release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PREV_TAG="$(gh api "repos/${{ github.repository }}/releases?per_page=100" \
            --jq --arg cur "${GITHUB_REF_NAME}" \
            '[.[] | select(.draft == false and .tag_name != $cur)] | first | .tag_name // empty')"
          NOTES_ARGS=( --method POST "repos/${{ github.repository }}/releases/generate-notes" -f "tag_name=${GITHUB_REF_NAME}" )
          if [[ -n "${PREV_TAG}" ]]; then
            echo "Comparing ${GITHUB_REF_NAME} to previous published release tag: ${PREV_TAG}"
            NOTES_ARGS+=( -f "previous_tag_name=${PREV_TAG}" )
          else
            echo "No earlier published release found; GitHub will choose the default baseline for generate-notes."
          fi
          gh api "${NOTES_ARGS[@]}" --jq .body > release-notes.md
          gh release edit "${GITHUB_REF_NAME}" --notes-file release-notes.md
